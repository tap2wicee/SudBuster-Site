<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SudBuster | Premium Mobile Car Detailing</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0b0c10] text-[#c5c6c7] font-sans">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[#0b0c10]/80 backdrop-blur-md border-b border-[#1f2833]">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="text-2xl font-black tracking-wider text-white">
        SUD<span class="text-[#66fcf1]">BUSTER</span>
      </div>
      
      <!-- Clickable Header Phone Number -->
      <a href="tel:+13146490476" class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-full bg-[#1f2833] text-white font-semibold border border-[#66fcf1]/30 hover:border-[#66fcf1] transition-all duration-300">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
        (314) 649-0476
      </a>
    </div>
  </header>

  <!-- Hero Section -->
  <main class="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
    <!-- Glow Effect Backdrops -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#66fcf1]/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[#45a29e]/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="max-w-4xl mx-auto px-6 text-center z-10">
      <span class="text-xs font-bold tracking-widest text-[#66fcf1] uppercase bg-[#66fcf1]/10 px-4 py-1.5 rounded-full border border-[#66fcf1]/20">
        Mobile Detailing Straight To Your Door
      </span>
      
      <h1 class="text-5xl md:text-7xl font-black text-white tracking-tight mt-6 mb-6 leading-none">
        The Ultimate Ceramic Shine, <br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#66fcf1] to-[#45a29e]">
          Without Leaving Home.
        </span>
      </h1>
      
      <p class="text-lg md:text-xl text-[#c5c6c7] max-w-2xl mx-auto mb-10 leading-relaxed">
        Premium interior restoration and exterior gloss enhancements. Your car is our canvas—brought directly to your driveway.
      </p>

      <!-- Action Buttons Area -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <!-- Call Button -->
        <a href="tel:+13146490476" class="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-[#66fcf1] to-[#45a29e] text-[#0b0c10] font-bold rounded-xl shadow-[0_0_20px_rgba(102,252,241,0.3)] hover:shadow-[0_0_35px_rgba(102,252,241,0.5)] transform hover:-translate-y-0.5 transition-all duration-300 text-center text-lg">
          Call Now: (314) 649-0476
        </a>
        
        <!-- Text Button -->
        <a href="sms:+13146490476?body=Hi%20SudBuster!%20I'd%20like%20to%20get%20a%20quote%20for%20a%20detailing%20service." class="w-full sm:w-auto px-8 py-4 bg-[#1f2833] text-white font-bold rounded-xl border border-[#45a29e]/30 hover:border-[#66fcf1] transform hover:-translate-y-0.5 transition-all duration-300 text-center text-lg">
          Text For A Quote
        </a>
      </div>
    </div>
  </main>

</body>
</html>
